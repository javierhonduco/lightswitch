## Minimal ELF with .text only for the missing-.eh_frame error path.
--- !ELF
FileHeader:
  Class: ELFCLASS64
  Data: ELFDATA2LSB
  Type: ET_EXEC
  Machine: EM_X86_64
  Entry: 0x1000
Sections:
  - Name: .text
    Type: SHT_PROGBITS
    Flags: [ SHF_ALLOC, SHF_EXECINSTR ]
    Address: 0x1000
    AddressAlign: 0x4
    Content: "c3"
...
